---
name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          with-tags: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Prepare Ko
        uses: ko-build/setup-ko@v0.9

      - name: Compute build metadata
        env:
          REVISION: ${{ github.sha }}
        run: |
          {
            echo BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo REVISION="${REVISION}"
            echo VERSION="$(git describe --always)"
          } >> "$GITHUB_ENV"

      - name: Build and publish container image
        env:
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          KO_DATA_DATE_EPOCH=$(git log -1 --format='%ct')
          export KO_DATA_DATE_EPOCH
          IMAGE="$(ko build --bare --tags "${GITHUB_REF_NAME}" \
            --image-label org.opencontainers.image.source="${SOURCE_URL}" \
            --image-label org.opencontainers.image.revision="${REVISION}" \
            --image-label org.opencontainers.image.version="${VERSION}" \
            --image-label org.opencontainers.image.created="${BUILD_DATE}" \
            --image-label org.opencontainers.image.title=pkgproxy \
            --image-label org.opencontainers.image.vendor=ganto \
            --image-label org.opencontainers.image.licenses=Apache-2.0 \
            --image-label 'org.opencontainers.image.description=Caching forward proxy for Linux package repositories' \
            --image-annotation org.opencontainers.image.source="${SOURCE_URL}" \
            --image-annotation org.opencontainers.image.revision="${REVISION}")"
          cosign sign --yes "${IMAGE}"

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk "/^## \[${GITHUB_REF_NAME}\]/{found=1; next} found && /^## \[/{exit} found" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Error: No changelog section found for ${GITHUB_REF_NAME} in CHANGELOG.md"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --notes-file release-notes.md
